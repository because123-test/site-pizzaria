<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Casino - Roleta</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>🎰 Don Casino</h1>

  <p class="desc">
    Gire a roleta premium e ganhe prêmios instantâneos.
  </p>

  <div class="saldo-box">
    Saldo: R$ <span id="saldo">100</span>
  </div>

  <div class="card">
    <input id="valor" type="number" placeholder="Adicionar saldo">
    <button onclick="depositar()">Depositar</button>
  </div>

  <div class="card">
    <h3>🎡 Roleta de Prêmios (R$10)</h3>

    <div class="roleta-box">
      <canvas id="roleta" width="300" height="300"></canvas>
      <div class="ponteiro">▼</div>
    </div>

    <p id="resultado">Clique para girar</p>
    <button onclick="girar()">Girar Roleta</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
