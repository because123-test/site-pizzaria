<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Don Casino - Roleta</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <h1>🎰 Don Casino</h1>

  <div class="saldo">
    Saldo: R$ <span id="saldo">100</span>
  </div>

  <div class="card">
    <input id="valor" type="number" placeholder="Depositar">
    <button onclick="depositar()">Depositar</button>
  </div>

  <div class="card">
    <h3>🎡 Roleta de Multiplicador</h3>

    <div class="roleta-box">
      <canvas id="roleta" width="300" height="300"></canvas>
      <div class="ponteiro"></div>
    </div>

    <button onclick="girar()">Girar (R$10)</button>
    <p id="res">Clique para girar</p>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
