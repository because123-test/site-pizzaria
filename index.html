<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Don Casino</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎰 Don Casino</h1>

  <div class="card saldo-box">
    <p>Saldo</p>
    <h2>R$ <span id="saldo">100</span></h2>
  </div>

  <div class="card deposito">
    <input id="valor" type="number" placeholder="Depositar valor">
    <button onclick="depositar()">Depositar</button>
  </div>

  <div class="card raspadinha">
    <h3>🎟️ Raspadinha (R$10)</h3>

    <div class="scratch-container">
      <canvas id="canvas" width="300" height="150"></canvas>
    </div>

    <p id="res">Clique em "Nova"</p>
    <button onclick="nova()">Nova Raspadinha</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
